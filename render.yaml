services:
  # Main web service
  - type: web
    name: taptico-ai
    runtime: node
    env: node
    region: oregon
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: taptico-db
          property: connectionString
      - key: VITE_OAUTH_PORTAL_URL
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    autoDeploy: true

databases:
  - name: taptico-db
    databaseName: taptico
    user: taptico
    region: oregon
    plan: starter
